name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Teste 01 - Ignorar espacos
      id: teste01
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Teste 01 - Ignorar espaços
        setup-command: ''
        command: mvn test -Dtest=ValidadorFase1Test#test01_IgnorarEspacosEmBranco -f fase01-o-caos-das-strings/pom.xml
        timeout: 10
        max-score: 2

    - name: Teste 02 - Operadores
      id: teste02
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Teste 02 - Operadores
        setup-command: ''
        command: mvn test -Dtest=ValidadorFase1Test#test02_OperadoresSimples -f fase01-o-caos-das-strings/pom.xml
        timeout: 10
        max-score: 2

    - name: Teste 03 - Identificadores
      id: teste03
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Teste 03 - Identificadores
        setup-command: ''
        command: mvn test -Dtest=ValidadorFase1Test#test03_Identificadores -f fase01-o-caos-das-strings/pom.xml
        timeout: 10
        max-score: 2

    - name: Teste 04 - Numeros
      id: teste04
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Teste 04 - Números
        setup-command: ''
        command: mvn test -Dtest=ValidadorFase1Test#test04_Numeros -f fase01-o-caos-das-strings/pom.xml
        timeout: 10
        max-score: 2

    - name: Teste 05 - Programa completo
      id: teste05
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Teste 05 - Programa completo
        setup-command: ''
        command: mvn test -Dtest=ValidadorFase1Test#test05_ProgramaCompleto -f fase01-o-caos-das-strings/pom.xml
        timeout: 10
        max-score: 2

    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TESTE01_RESULTS: "${{steps.teste01.outputs.result}}"
        TESTE02_RESULTS: "${{steps.teste02.outputs.result}}"
        TESTE03_RESULTS: "${{steps.teste03.outputs.result}}"
        TESTE04_RESULTS: "${{steps.teste04.outputs.result}}"
        TESTE05_RESULTS: "${{steps.teste05.outputs.result}}"
      with:
        runners: teste01,teste02,teste03,teste04,teste05